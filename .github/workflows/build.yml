name: Build/Test and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc-14 \
            g++-14 \
            binutils

      - name: Build Debug
        run: make debug

      - name: Build Release
        run: make release

      - name: Unit Tests
        run: make tests

      - name: Upload Debug Artifact
        uses: actions/upload-artifact@v7
        with:
          name: debug-build
          path: |
            build/debug/bin
          if-no-files-found: ignore

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-build
          path: |
            build/release/bin
          if-no-files-found: ignore      

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: build/tests/test-results.xml

      - name: Package Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE="posix-networking-toolset-${GITHUB_REF_NAME}-linux-x86_64"

          mkdir -p "${PACKAGE}"

          cp -r build/release/bin/* "${PACKAGE}/" 2>/dev/null || true

          cp README.md "${PACKAGE}/" 2>/dev/null || true
          cp LICENSE "${PACKAGE}/" 2>/dev/null || true

          tar -czf "${PACKAGE}.tar.gz" "${PACKAGE}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            posix-networking-toolset-${{ github.ref_name }}-linux-x86_64.tar.gz